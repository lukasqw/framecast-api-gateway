name: Rollback API Gateway

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to rollback to (e.g. v1.2.3) â€” must be an existing tag'
        required: true
        type: string
      environment:
        description: 'Target environment'
        required: false
        type: choice
        options:
          - production
          - staging
        default: production

permissions:
  contents: read
  id-token: write

# Same concurrency group as deploy â€” prevents a rollback from running alongside a deploy.
concurrency:
  group: deploy
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}

jobs:
  rollback:
    name: Rollback to ${{ github.event.inputs.version }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Validate Version Format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: '$VERSION'. Expected format: v1.2.3"
            exit 1
          fi

      # Checkout at the specific tag so Terraform code, Lambda source and
      # OpenAPI spec match exactly what was applied at that version.
      - name: Checkout at ${{ github.event.inputs.version }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}
          fetch-depth: 0

      - name: Validate Tag Exists
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag '$VERSION' does not exist in this repository"
            exit 1
          fi
          echo "::notice::Rolling back to $VERSION ($(git rev-parse --short $VERSION))"

      - name: Validate Required Secrets
        run: |
          MISSING=()
          [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]     && MISSING+=("AWS_ACCESS_KEY_ID")
          [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] && MISSING+=("AWS_SECRET_ACCESS_KEY")
          [ -z "${{ secrets.JWT_SECRET_KEY }}" ]         && MISSING+=("JWT_SECRET_KEY")
          [ -z "${{ secrets.DB_PASSWORD }}" ]            && MISSING+=("DB_PASSWORD")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Required secrets missing: ${MISSING[*]}"
            exit 1
          fi

      # Terraform requires the Lambda zip and OpenAPI spec to exist on disk.
      # Build them from the checked-out tag before applying.
      - name: Build OpenAPI Spec
        uses: ./.github/actions/build/openapi

      - name: Build Lambda Package
        uses: ./.github/actions/build/lambda

      # plan_sha is intentionally omitted â€” rollback always generates a fresh plan
      # against the checked-out tag to avoid applying a stale/mismatched artifact.
      - name: Apply API Gateway at ${{ github.event.inputs.version }}
        id: apply
        uses: ./.github/actions/deploy/tf-apply
        with:
          tf_version: ${{ vars.TF_VERSION || '1.7.0' }}
          working_dir: ${{ vars.TF_WORKING_DIR || '.' }}
          environment: ${{ env.ENVIRONMENT }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws_region: ${{ env.AWS_REGION }}
          jwt_secret: ${{ secrets.JWT_SECRET_KEY }}
          db_password: ${{ secrets.DB_PASSWORD }}

      - name: API Gateway Health Check
        uses: ./.github/actions/deploy/api-check
        with:
          api_endpoint: ${{ steps.apply.outputs.api_endpoint }}
          health_endpoint: ${{ vars.HEALTH_ENDPOINT || '/health' }}

      - name: Rollback Summary
        if: always()
        run: |
          {
            echo "## Rollback Summary"
            echo ""
            echo "| Resource | Value |"
            echo "|----------|-------|"
            echo "| Rolled back to | \`${{ github.event.inputs.version }}\` |"
            echo "| Environment | \`${{ env.ENVIRONMENT }}\` |"
            echo "| API Endpoint | \`${{ steps.apply.outputs.api_endpoint }}\` |"
            echo "| API Gateway ID | \`${{ steps.apply.outputs.api_id }}\` |"
            echo "| Region | \`${{ env.AWS_REGION }}\` |"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Actor | @${{ github.actor }} |"
            echo "| Run | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo ""
            echo "> **Note:** No new tag was created. The rollback applied the Terraform state from \`${{ github.event.inputs.version }}\`."
          } >> $GITHUB_STEP_SUMMARY
