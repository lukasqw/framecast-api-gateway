name: Destroy API Gateway Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type "DESTROY" to confirm'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-destroy-api-gateway
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  destroy:
    name: Destroy — production
    runs-on: ubuntu-latest
    environment: production-destroy

    steps:
      - name: Validate Confirmation
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "DESTROY" ]; then
            echo "::error::Confirmation must be exactly 'DESTROY'"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      # Terraform references the Lambda zip and OpenAPI spec — both must
      # exist on disk before destroy can run without errors.
      - name: Build OpenAPI Spec
        uses: ./.github/actions/build/openapi

      - name: Build Lambda Package
        uses: ./.github/actions/build/lambda

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TF_VERSION || '1.7.0' }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ vars.TF_WORKING_DIR || '.' }}
        run: terraform init -reconfigure

      - name: Terraform Destroy
        working-directory: ${{ vars.TF_WORKING_DIR || '.' }}
        env:
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET_KEY }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: terraform destroy -auto-approve
