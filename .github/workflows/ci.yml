name: CI

on:
  pull_request:
    branches: [develop, main]
    paths:
      - "**.tf"
      - "lambda/**"
      - "openapi/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [develop]
    paths:
      - "**.tf"
      - "lambda/**"
      - "openapi/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: gateway-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  validate-openapi:
    name: Validate OpenAPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install pyyaml jsonschema

      - name: Build OpenAPI Spec
        run: python scripts/build-openapi.py

      - name: Validate OpenAPI Spec
        run: |
          if [ ! -f openapi-spec.json ]; then
            echo "::error::OpenAPI spec not generated"
            exit 1
          fi

          # Basic JSON validation
          python -m json.tool openapi-spec.json > /dev/null
          echo "::notice::OpenAPI spec is valid JSON"

      - name: Upload OpenAPI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: openapi-spec.json
          retention-days: 7

  test-lambda:
    name: Test Lambda Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: lambda/package.json

      - name: Install Dependencies
        working-directory: lambda
        run: npm ci

      - name: Run Tests
        working-directory: lambda
        run: npm test || echo "::warning::No tests configured yet"

      - name: Install Auth Lambda Dependencies
        working-directory: lambda/auth
        run: npm ci

      - name: Test Auth Lambda
        working-directory: lambda/auth
        run: npm test || echo "::warning::No tests configured yet"

  lint-lambda:
    name: Lint Lambda Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        working-directory: lambda
        run: npm ci

      - name: Run ESLint
        working-directory: lambda
        run: npm run lint || echo "::warning::ESLint not configured"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit Lambda Dependencies
        working-directory: lambda
        run: npm audit --audit-level=moderate || true

      - name: Audit Auth Lambda Dependencies
        working-directory: lambda/auth
        run: npm audit --audit-level=moderate || true

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "0"
