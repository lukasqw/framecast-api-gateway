name: CI

on:
  pull_request:
    branches: [ develop, main ]
    paths:
      - "terraform/**"
      - "openapi/**"
      - "scripts/**"
      - ".github/workflows/**"
  push:
    branches: [ develop ]
    paths:
      - "terraform/**"
      - "openapi/**"
      - "scripts/**"

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================
  # STAGE 1: Build OpenAPI spec
  # ===========================================
  build:
    name: Build OpenAPI Spec
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build OpenAPI Spec
        uses: ./.github/actions/build/openapi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: openapi-spec.json
          retention-days: 1

  # ===========================================
  # STAGE 2: Validate & Structure
  # ===========================================
  validate:
    name: Validate
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}

      - name: Terraform Validate
        uses: ./.github/actions/ci/tf-validate
        with:
          tf_version: ${{ vars.TF_VERSION || '1.7.0' }}
          working_dir: ${{ vars.TF_WORKING_DIR || 'terraform/environments/production' }}

      - name: Structure Check
        uses: ./.github/actions/ci/tf-structure
        with:
          working_dir: ${{ vars.TF_WORKING_DIR || 'terraform/environments/production' }}

  # ===========================================
  # STAGE 3: Security + Plan (parallel)
  # ===========================================
  security:
    name: Security Scan
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Security Scan
        uses: ./.github/actions/ci/tf-security
        with:
          working_dir: ${{ vars.TF_WORKING_DIR || 'terraform/environments/production' }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  plan:
    name: Terraform Plan
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}

      - name: Terraform Plan
        uses: ./.github/actions/ci/tf-plan
        with:
          tf_version: ${{ vars.TF_VERSION || '1.7.0' }}
          working_dir: ${{ vars.TF_WORKING_DIR || 'terraform/environments/production' }}
          tf_state_bucket: ${{ vars.TF_STATE_BUCKET || 'fiap-soat-tf-backend-framecast' }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
