name: CI

on:
  pull_request:
    branches: [ develop, main ]
    paths:
      - "terraform/**"
      - "lambda/**"
      - "openapi/**"
      - "scripts/**"
      - ".github/workflows/**"
  push:
    branches: [ develop ]
    paths:
      - "terraform/**"
      - "lambda/**"
      - "openapi/**"
      - "scripts/**"

permissions:
  contents: read
  pull-requests: write
  id-token: write
  security-events: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================
  # STAGE 1: Build artifacts (OpenAPI + Lambda)
  # Required before Terraform can validate or plan.
  # ===========================================
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build OpenAPI Spec
        uses: ./.github/actions/build/openapi

      - name: Build Lambda Package
        uses: ./.github/actions/build/lambda

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: |
            openapi-spec.json
            lambda/auth.zip
          retention-days: 1

  # ===========================================
  # STAGE 2: Validate & Structure
  # ===========================================
  validate:
    name: Validate
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}

      - name: Terraform Validate
        uses: ./.github/actions/ci/tf-validate
        with:
          tf_version: ${{ vars.TF_VERSION || '1.7.0' }}
          working_dir: ${{ vars.TF_WORKING_DIR || '.' }}

      - name: Structure Check
        uses: ./.github/actions/ci/tf-structure
        with:
          working_dir: ${{ vars.TF_WORKING_DIR || '.' }}

  # ===========================================
  # STAGE 3: Security + Plan (parallel)
  # Plan only runs on PRs — same pattern as infra and db repos.
  # Lambda quality runs independently in parallel.
  # ===========================================
  security:
    name: Security Scan
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Security Scan
        uses: ./.github/actions/ci/tf-security
        with:
          working_dir: ${{ vars.TF_WORKING_DIR || '.' }}

  plan:
    name: Terraform Plan
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}

      - name: Terraform Plan
        uses: ./.github/actions/ci/tf-plan
        with:
          tf_version: ${{ vars.TF_VERSION || '1.7.0' }}
          working_dir: ${{ vars.TF_WORKING_DIR || '.' }}
          tf_state_bucket: ${{ vars.TF_STATE_BUCKET || 'fiap-soat-tf-backend-oficina-tech' }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
          jwt_secret: ${{ secrets.JWT_SECRET_KEY }}
          db_password: ${{ secrets.DB_PASSWORD }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  lambda-quality:
    name: Lambda Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION || '20' }}
          cache: npm
          cache-dependency-path: lambda/package.json

      - name: Install Lambda Dependencies
        working-directory: lambda
        run: npm ci

      - name: Run Lambda Tests
        working-directory: lambda
        run: npm test || echo "::warning::No tests configured yet"

      - name: Run Lambda Lint
        working-directory: lambda
        run: npm run lint || echo "::warning::ESLint not configured"

      - name: Install Auth Lambda Dependencies
        working-directory: lambda/auth
        run: npm ci

      - name: Run Auth Lambda Tests
        working-directory: lambda/auth
        run: npm test || echo "::warning::No tests configured yet"

      - name: Audit Dependencies
        run: |
          (cd lambda && npm audit --audit-level=moderate) || true
          (cd lambda/auth && npm audit --audit-level=moderate) || true

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '0'
