name: 'Build — Lambda Package'
description: >
  Installs Node.js production dependencies and zips the Lambda function.
  Produces a deployable package at the specified output path.

inputs:
  node_version:
    description: 'Node.js version to use'
    required: false
    default: '20'
  lambda_dir:
    description: 'Directory containing the Lambda source code'
    required: false
    default: 'lambda/auth'
  output_zip:
    description: 'Output path for the Lambda zip package (relative to repo root)'
    required: false
    default: 'lambda/auth.zip'

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}

    - name: Install Dependencies
      shell: bash
      working-directory: ${{ inputs.lambda_dir }}
      run: npm ci --production

    - name: Package Lambda
      shell: bash
      working-directory: ${{ inputs.lambda_dir }}
      run: |
        ZIP_PATH="${{ github.workspace }}/${{ inputs.output_zip }}"
        zip -r "$ZIP_PATH" . -x "*.git*" "node_modules/.cache/*"
        echo "::notice::Lambda package created — $(du -h "$ZIP_PATH" | cut -f1)"
